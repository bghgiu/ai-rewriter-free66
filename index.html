<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Free AI Paraphraser</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
        :root{--bg:#f9f9f9;--card:#fff;--text:#111;--border:#ddd;--primary:#007bff}
        .dark{--bg:#1a1a1a;--card:#282828;--text:#eee;--border:#444}
        body{max-width:800px;margin:40px auto;padding:0 20px;background:var(--bg);color:var(--text);transition:0.3s}
        .box{background:var(--card);padding:24px;border-radius:12px;box-shadow:0 2px 12px #00000010}
        textarea{width:100%;height:180px;padding:12px;margin:10px 0;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);resize:vertical}
        .btn-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
        button{background:var(--primary);color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;transition:0.2s}
        button.gray{background:#6c757d}
        .result{margin-top:20px;padding:16px;background:var(--border);border-radius:8px;min-height:100px;white-space:pre-wrap}
        .tg{margin-top:20px;text-align:center;color:var(--text)}
        .tg a{color:var(--primary);font-weight:bold}
        .tip{color:#888;font-size:14px;margin:8px 0}
        .loading{display:inline-block;width:16px;height:16px;border:3px solid #fff3;border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="box">
        <div style="display:flex;justify-content:space-between;align-items:center">
            <h2>Free AI Paraphraser | 文本改写工具</h2>
            <button id="themeBtn" class="gray">切换深色模式</button>
        </div>
        <p class="tip">免费每日3次使用，无需登录 | <span id="leftCount">剩余3次</span></p>
        <textarea id="input" placeholder="粘贴需要改写的英文文本..." maxlength="1200"></textarea>
        <div class="btn-row">
            <button onclick="rewrite()">意译改写</button>
            <button class="gray" onclick="clearAll()">清空全部</button>
            <button class="gray" onclick="copyResult()">复制改写结果</button>
        </div>
        <div class="result" id="result"></div>
    </div>
    <div class="tg">
        无限额度 & API密钥咨询 → Telegram: <a href="" target="_blank">@AiRewriteSupport</a>
    </div>

    <script>
        let count = 0;
        const resultDom = document.getElementById('result');
        const leftCountDom = document.getElementById('leftCount');
        const inputDom = document.getElementById('input');
        // 剩余次数实时更新
        function refreshCount(){
            leftCountDom.innerText = `剩余${3-count}次`;
        }
        refreshCount();

        // 清空输入输出
        function clearAll(){
            inputDom.value = '';
            resultDom.innerText = '';
        }
        // 复制结果
        async function copyResult(){
            if(!resultDom.innerText || resultDom.innerText.includes('Processing')) return alert('暂无可复制内容');
            await navigator.clipboard.writeText(resultDom.innerText);
            alert('复制成功！');
        }
        // 深色浅色切换
        document.getElementById('themeBtn').onclick = function(){
            document.body.classList.toggle('dark');
            this.innerText = document.body.classList.contains('dark') ? '切换浅色模式' : '切换深色模式';
        }

        async function rewrite() {
            if(count >= 3) {
                resultDom.innerText = "Daily limit reached. DM Telegram for unlimited.";
                return;
            }
            const text = inputDom.value.trim();
            if(!text) return alert("请输入文本");
            // 加载动画
            resultDom.innerHTML = `<span class="loading"></span> 正在生成改写内容...`;

            try{
                const res = await fetch("/api/proxy", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({
                        messages: [{role:"user",content:"Paraphrase this text: "+text}]
                    })
                });
                const data = await res.json();
                let out = data.choices?.[0]?.message?.content || "Error：接口调用失败，请稍后重试";
                resultDom.innerText = out;
                count++;
                refreshCount();
            }catch(err){
                resultDom.innerText = "网络超时，请重新尝试";
            }
        }
    </script>
</body>
</html>
